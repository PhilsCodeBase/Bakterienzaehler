<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Punktzähler</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f7f6f2;
      --ink: #1a1a1a;
      --accent: #1a1a1a;
      --muted: #999;
      --card: #ffffff;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 480px;
      padding: 52px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    header p {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    main {
      width: 100%;
      max-width: 480px;
      padding: 0 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Upload / Camera area ── */
    #drop-zone {
      background: var(--card);
      border: 2px dashed #ddd;
      border-radius: var(--radius);
      padding: 36px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    #drop-zone.dragover {
      border-color: var(--ink);
      background: #f0efe9;
    }

    #drop-zone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg { fill: #fff; }

    #drop-zone span {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
    }

    #drop-zone small {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Camera button ── */
    #camera-btn {
      width: 100%;
      padding: 14px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
    }
    #camera-btn:active { opacity: 0.75; }

    /* ── Preview & result ── */
    #preview-wrap {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    #preview-wrap.visible { display: flex; }

    #canvas-wrap {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: #eee;
      line-height: 0;
    }

    #preview-canvas {
      width: 100%;
      display: block;
      border-radius: var(--radius);
    }

    /* ── Result card ── */
    #result-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    #count-display {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    #result-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-align: right;
    }

    #result-meta strong {
      font-size: 14px;
      font-weight: 600;
    }

    #result-meta span {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Threshold slider ── */
    #settings-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .setting-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .setting-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .setting-label span { font-size: 13px; font-weight: 600; }
    .setting-label small { font-size: 12px; color: var(--muted); }

    input[type=range] {
      width: 100%;
      accent-color: var(--ink);
      height: 4px;
      cursor: pointer;
    }

    /* ── Retry btn ── */
    #retry-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--ink);
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #retry-btn:active { background: var(--ink); color: #fff; }

    /* ── Camera modal ── */
    #cam-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      flex-direction: column;
    }
    #cam-modal.open { display: flex; }

    #cam-video {
      flex: 1;
      width: 100%;
      object-fit: cover;
    }

    #cam-controls {
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #000;
    }

    #snap-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid #555;
      cursor: pointer;
      transition: transform 0.1s;
    }
    #snap-btn:active { transform: scale(0.92); }

    #close-cam {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      font-size: 28px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>Punktzähler</h1>
  <p>Schwarze Punkte auf weißem Hintergrund zählen</p>
</header>

<main>
  <!-- Upload -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept="image/*" />
    <div class="icon">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
    </div>
    <span>Bild hochladen</span>
    <small>oder hierher ziehen</small>
  </div>

  <!-- Camera -->
  <button id="camera-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4zm0-8.4a5.2 5.2 0 1 1 0 10.4A5.2 5.2 0 0 1 12 6.8zM9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9z"/></svg>
    Foto aufnehmen
  </button>

  <!-- Results (hidden until image loaded) -->
  <div id="preview-wrap">
    <div id="canvas-wrap">
      <canvas id="preview-canvas"></canvas>
    </div>

    <div id="result-card">
      <div id="count-display">0</div>
      <div id="result-meta">
        <strong>Punkte erkannt</strong>
        <span id="size-hint">–</span>
      </div>
    </div>

    <div id="settings-card">
      <div class="setting-row">
        <div class="setting-label">
          <span>Schwellwert (Helligkeit)</span>
          <small id="thresh-val">128</small>
        </div>
        <input type="range" id="thresh" min="50" max="220" value="128" />
      </div>
      <div class="setting-row">
        <div class="setting-label">
          <span>Min. Punktgröße (px²)</span>
          <small id="minsize-val">20</small>
        </div>
        <input type="range" id="minsize" min="5" max="500" value="20" />
      </div>
      <div class="setting-row">
        <div class="setting-label">
          <span>Max. Punktgröße (px²)</span>
          <small id="maxsize-val">5000</small>
        </div>
        <input type="range" id="maxsize" min="100" max="20000" value="5000" />
      </div>
    </div>

    <button id="retry-btn">Neues Bild</button>
  </div>
</main>

<!-- Camera modal -->
<div id="cam-modal">
  <video id="cam-video" autoplay playsinline muted></video>
  <button id="close-cam">✕</button>
  <div id="cam-controls">
    <button id="snap-btn"></button>
  </div>
</div>

<script>
  // ── Elements ──
  const fileInput    = document.getElementById('file-input');
  const dropZone     = document.getElementById('drop-zone');
  const cameraBtn    = document.getElementById('camera-btn');
  const previewWrap  = document.getElementById('preview-wrap');
  const previewCanvas= document.getElementById('preview-canvas');
  const countDisplay = document.getElementById('count-display');
  const sizeHint     = document.getElementById('size-hint');
  const retryBtn     = document.getElementById('retry-btn');
  const threshSlider = document.getElementById('thresh');
  const threshVal    = document.getElementById('thresh-val');
  const minsizeSlider= document.getElementById('minsize');
  const minsizeVal   = document.getElementById('minsize-val');
  const maxsizeSlider= document.getElementById('maxsize');
  const maxsizeVal   = document.getElementById('maxsize-val');
  const camModal     = document.getElementById('cam-modal');
  const camVideo     = document.getElementById('cam-video');
  const snapBtn      = document.getElementById('snap-btn');
  const closeCam     = document.getElementById('close-cam');

  let currentImage = null;
  let camStream    = null;

  // ── Load image from file ──
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) loadImage(file);
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) loadImage(file);
  });

  function loadImage(file) {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      currentImage = img;
      analyze();
    };
    img.src = url;
  }

  // ── Camera ──
  cameraBtn.addEventListener('click', async () => {
    try {
      camStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }, audio: false
      });
      camVideo.srcObject = camStream;
      camModal.classList.add('open');
    } catch {
      alert('Kamerazugriff nicht möglich.');
    }
  });

  snapBtn.addEventListener('click', () => {
    const tmp = document.createElement('canvas');
    tmp.width  = camVideo.videoWidth;
    tmp.height = camVideo.videoHeight;
    tmp.getContext('2d').drawImage(camVideo, 0, 0);
    const img = new Image();
    img.onload = () => { currentImage = img; analyze(); };
    img.src = tmp.toDataURL('image/jpeg', 0.95);
    closeCamera();
  });

  closeCam.addEventListener('click', closeCamera);

  function closeCamera() {
    camModal.classList.remove('open');
    if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  }

  // ── Retry ──
  retryBtn.addEventListener('click', () => {
    previewWrap.classList.remove('visible');
    currentImage = null;
    fileInput.value = '';
  });

  // ── Sliders ──
  threshSlider.addEventListener('input', () => { threshVal.textContent = threshSlider.value; if (currentImage) analyze(); });
  minsizeSlider.addEventListener('input', () => { minsizeVal.textContent = minsizeSlider.value; if (currentImage) analyze(); });
  maxsizeSlider.addEventListener('input', () => { maxsizeVal.textContent = maxsizeSlider.value; if (currentImage) analyze(); });

  // ── Core analysis ──
  function analyze() {
    if (!currentImage) return;

    const threshold = parseInt(threshSlider.value);
    const minSize   = parseInt(minsizeSlider.value);
    const maxSize   = parseInt(maxsizeSlider.value);

    // Draw to offscreen canvas
    const W = currentImage.naturalWidth;
    const H = currentImage.naturalHeight;
    const offscreen = document.createElement('canvas');
    offscreen.width  = W;
    offscreen.height = H;
    const ctx = offscreen.getContext('2d');
    ctx.drawImage(currentImage, 0, 0);

    const imgData = ctx.getImageData(0, 0, W, H);
    const data    = imgData.data;

    // Binary mask: 1 = dark pixel
    const mask = new Uint8Array(W * H);
    for (let i = 0; i < W * H; i++) {
      const r = data[i*4], g = data[i*4+1], b = data[i*4+2];
      const lum = 0.299*r + 0.587*g + 0.114*b;
      mask[i] = lum < threshold ? 1 : 0;
    }

    // Connected components (BFS)
    const visited = new Uint8Array(W * H);
    const blobs   = [];

    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const idx = y * W + x;
        if (mask[idx] === 0 || visited[idx]) continue;

        // BFS
        const queue  = [idx];
        const pixels = [];
        visited[idx] = 1;

        while (queue.length) {
          const cur = queue.pop();
          pixels.push(cur);
          const cx = cur % W, cy = Math.floor(cur / W);

          for (const [nx, ny] of [[cx-1,cy],[cx+1,cy],[cx,cy-1],[cx,cy+1]]) {
            if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
            const ni = ny * W + nx;
            if (mask[ni] && !visited[ni]) { visited[ni] = 1; queue.push(ni); }
          }
        }

        const area = pixels.length;
        if (area >= minSize && area <= maxSize) {
          // Centroid
          let sumX = 0, sumY = 0;
          for (const p of pixels) { sumX += p % W; sumY += Math.floor(p / W); }
          blobs.push({ cx: sumX/area, cy: sumY/area, area, pixels });
        }
      }
    }

    // ── Draw result ──
    // Fit to display canvas
    const displayW = Math.min(W, 1200);
    const scale    = displayW / W;
    const displayH = H * scale;

    previewCanvas.width  = displayW;
    previewCanvas.height = displayH;
    const dCtx = previewCanvas.getContext('2d');
    dCtx.drawImage(currentImage, 0, 0, displayW, displayH);

    // Highlight each blob
    blobs.forEach((blob, i) => {
      const r = Math.sqrt(blob.area / Math.PI) * scale;
      dCtx.beginPath();
      dCtx.arc(blob.cx * scale, blob.cy * scale, r + 3, 0, Math.PI * 2);
      dCtx.strokeStyle = '#ef4444';
      dCtx.lineWidth   = 2;
      dCtx.stroke();

      // Number label
      dCtx.font         = `bold ${Math.max(10, r)}px -apple-system, sans-serif`;
      dCtx.fillStyle    = '#ef4444';
      dCtx.textAlign    = 'center';
      dCtx.textBaseline = 'middle';
      dCtx.fillText(i + 1, blob.cx * scale, blob.cy * scale);
    });

    // Update UI
    countDisplay.textContent = blobs.length;
    sizeHint.textContent = `Bildgröße ${W} × ${H} px`;

    previewWrap.classList.add('visible');
  }
</script>
</body>
</html>
